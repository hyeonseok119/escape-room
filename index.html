<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현석방탈출</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f9f9f9;
      color: #222222;
      font-family: 'Arial', sans-serif;
      padding: 30px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2rem;
      color: #ff6b00;
    }

    header p {
      color: #888888;
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .search-bar {
      display: block;
      margin: 16px auto 0;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      border: 2px solid #ff6b00;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    @media (min-width: 600px) {
      .card-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .card {
      background-color: #ffffff;
      border: 2px solid #ff6b00;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(255, 107, 0, 0.3);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 3 / 2;
height: 100px;
      object-fit: contain;
padding: 8px;
    }

    .card-name {
      padding: 12px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: bold;
      color: #222222;
      background-color: #ffffff;
    }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 24px;
      width: 90%;
      max-width: 420px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ff6b00;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #888888;
    }

    .theme-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .theme-btn {
      display: block;
      padding: 14px 16px;
      background-color: #fff7f0;
      border: 2px solid #ff6b00;
      border-radius: 10px;
      text-decoration: none;
      color: #222222;
      font-size: 0.95rem;
      font-weight: bold;
      text-align: center;
      transition: background-color 0.2s, color 0.2s;
    }

    .theme-btn:hover {
      background-color: #ff6b00;
      color: white;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>🔐 현석방탈출</h1>
    <p>자주 가는 방탈출 사이트들을 한 곳에 모았어요</p>
    <input class="search-bar" type="text" id="search" placeholder="🔍 매장 이름으로 검색..." oninput="filterCards()">
  </header>

  <div class="card-container" id="cardContainer">

    <div class="card" onclick="openModal('zeroworld')">
      <img class="card-img" src="https://zerohongdae.com/storage/FUxKErAmgXZVl8jCvO46vQk0lvG3UYJoKIY3v4pC.png" alt="제로월드 홍대점">
      <div class="card-name">제로월드 홍대점</div>
    </div>

    <div class="card" onclick="openModal('danpyunson')">
      <img class="card-img" src="https://cdn.imweb.me/thumbnail/20221107/3aa26fe234692.png" alt="단편선 성수">
      <div class="card-name">단편선 성수</div>
    </div>

  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="theme-list" id="themeList"></div>
    </div>
  </div>

  <script>
    const themes = {
      zeroworld: {
        name: '제로월드 홍대점',
        list: [
          { name: 'NOX', url: 'https://zerohongdae.com/reservation' },
          { name: '층간소음', url: 'https://zerohongdae.com/reservation' },
          { name: '깜방탈출 : WAY OUT', url: 'https://zerohongdae.com/reservation' },
          { name: '사랑...하는...감?', url: 'https://zerohongdae.com/reservation' },
          { name: 'ALIVE', url: 'https://zerohongdae.com/reservation' },
        ]
      },
      danpyunson: {
        name: '단편선 성수',
        list: [
          { name: '쓰여진 문장 속에 구원이 없다면', url: 'https://dpsnnn-s.imweb.me/reserve_ss' },
          { name: '존재할 자격', url: 'https://dpsnnn-s.imweb.me/reserve_ss' },
          { name: '쥐와 파시스트와 마지막 한 장', url: 'https://dpsnnn-s.imweb.me/reserve_ss' },
          { name: '뱃사람의 별', url: 'https://dpsnnn-s.imweb.me/reserve_ss' },
        ]
      }
    };

    function openModal(id) {
      const store = themes[id];
      document.getElementById('modalTitle').textContent = store.name;
      const list = document.getElementById('themeList');
      list.innerHTML = '';
      store.list.forEach(theme => {
        const a = document.createElement('a');
        a.className = 'theme-btn';
        a.href = theme.url;
        a.target = '_blank';
        a.textContent = theme.name;
        list.appendChild(a);
      });
      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function closeModalOutside(event) {
      if (event.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    }

    function filterCards() {
      const keyword = document.getElementById('search').value.toLowerCase();
      const cards = document.querySelectorAll('.card');
      cards.forEach(card => {
        const name = card.querySelector('.card-name').textContent.toLowerCase();
        if (name.includes(keyword)) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }
  </script>

</body>
</html>
